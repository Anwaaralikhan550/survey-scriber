version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: surveyscriber_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: surveyscriber
      POSTGRES_PASSWORD: surveyscriber_secret
      POSTGRES_DB: surveyscriber_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U surveyscriber -d surveyscriber_db']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: surveyscriber_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@surveyscriber.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
