<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- SurveyScriber Logo - Modern Material 3 Design -->
  <!-- Represents: Clipboard (Survey) + Pen (Scriber) + Checkmark (Completion) -->

  <defs>
    <!-- Gradient for depth -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42A5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E88E5;stop-opacity:1" />
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Clipboard Body - Rounded Rectangle -->
  <rect x="96" y="80" width="280" height="352" rx="24" ry="24"
        fill="url(#primaryGradient)" filter="url(#shadow)"/>

  <!-- Clipboard Clip (top holder) -->
  <rect x="176" y="56" width="120" height="48" rx="8" ry="8" fill="#0D47A1"/>
  <rect x="192" y="72" width="88" height="24" rx="6" ry="6" fill="#BBDEFB"/>

  <!-- Survey Lines (form fields) -->
  <rect x="136" y="160" width="200" height="16" rx="8" fill="#BBDEFB" opacity="0.9"/>
  <rect x="136" y="200" width="160" height="16" rx="8" fill="#BBDEFB" opacity="0.7"/>
  <rect x="136" y="240" width="180" height="16" rx="8" fill="#BBDEFB" opacity="0.5"/>

  <!-- Checkmark Circle -->
  <circle cx="200" cy="340" r="48" fill="#4CAF50"/>
  <path d="M176 340 L192 356 L224 324"
        stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Pen/Stylus Element (Scriber) - Diagonal -->
  <g transform="rotate(-45, 380, 320)">
    <!-- Pen body -->
    <rect x="340" y="200" width="40" height="180" rx="6" fill="url(#accentGradient)"/>
    <!-- Pen tip -->
    <polygon points="340,380 380,380 360,420" fill="#0D47A1"/>
    <!-- Pen grip rings -->
    <rect x="340" y="260" width="40" height="6" rx="2" fill="#0D47A1" opacity="0.3"/>
    <rect x="340" y="280" width="40" height="6" rx="2" fill="#0D47A1" opacity="0.3"/>
    <!-- Pen top -->
    <rect x="340" y="200" width="40" height="20" rx="6" fill="#0D47A1"/>
  </g>

</svg>
